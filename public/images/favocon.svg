<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep Cambridge blue to forest green -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a3d;stop-opacity:1" />
    </linearGradient>

    <!-- Sky gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a8fa8;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#4a8fa8;stop-opacity:0" />
    </linearGradient>

    <!-- Ground gradient -->
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c59" />
      <stop offset="100%" style="stop-color:#2d5a3d" />
    </linearGradient>

    <!-- Icon drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Subtle inner glow on shield -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <clipPath id="roundedRect">
      <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200"/>
    </clipPath>
  </defs>

  <!-- App icon rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="url(#bgGrad)"/>

  <!-- Subtle noise texture overlay -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="url(#skyGrad)" opacity="0.4"/>

  <!-- Rolling hills background: far hills -->
  <ellipse cx="512" cy="820" rx="700" ry="220" fill="#3a6b4a" opacity="0.6"/>
  <ellipse cx="200" cy="840" rx="360" ry="180" fill="#4a7c59" opacity="0.5"/>
  <ellipse cx="850" cy="830" rx="320" ry="160" fill="#3d6e4d" opacity="0.5"/>

  <!-- Middle ground hills -->
  <ellipse cx="512" cy="900" rx="580" ry="200" fill="url(#groundGrad)" opacity="0.85"/>

  <!-- Path / trail winding across the ground -->
  <path d="M 120 940 Q 260 870 380 900 Q 500 930 640 880 Q 760 840 900 890"
        fill="none" stroke="#c8a96e" stroke-width="14" stroke-linecap="round"
        stroke-dasharray="0" opacity="0.75"/>

  <!-- ===== WALKING FIGURE (bold, silhouette) ===== -->
  <g transform="translate(512, 530)" filter="url(#shadow)">

    <!-- Walking stick -->
    <line x1="70" y1="-140" x2="100" y2="120"
          stroke="#d4b896" stroke-width="18" stroke-linecap="round"/>

    <!-- Body -->
    <!-- Head -->
    <circle cx="0" cy="-210" r="52" fill="#e8d5b0"/>

    <!-- Hat (classic walking / flat cap silhouette) -->
    <ellipse cx="0" cy="-245" rx="68" ry="14" fill="#c8a96e"/>
    <rect x="-45" y="-272" width="90" height="30" rx="8" fill="#c8a96e"/>

    <!-- Torso with jacket -->
    <rect x="-48" y="-158" width="96" height="120" rx="20" fill="#e8d5b0"/>
    <!-- Jacket -->
    <path d="M -48 -158 Q -60 -140 -55 -38 L 48 -38 Q 53 -140 48 -158 Z"
          fill="#2e5c3e" rx="10"/>
    <!-- Lapels -->
    <path d="M -20 -158 L 0 -100 L 20 -158" fill="#e8d5b0" opacity="0.6"/>

    <!-- Left arm (swinging forward) -->
    <path d="M -48 -140 Q -110 -80 -90 -10"
          fill="none" stroke="#2e5c3e" stroke-width="34" stroke-linecap="round"/>
    <!-- Left hand -->
    <circle cx="-90" cy="-10" r="18" fill="#e8d5b0"/>

    <!-- Right arm (back + holding stick) -->
    <path d="M 48 -140 Q 85 -90 80 -30"
          fill="none" stroke="#2e5c3e" stroke-width="34" stroke-linecap="round"/>

    <!-- Trousers -->
    <rect x="-40" y="-38" width="80" height="100" rx="10" fill="#3a4a5c"/>

    <!-- Left leg (striding forward) -->
    <path d="M -20 60 Q -30 110 -50 158"
          fill="none" stroke="#3a4a5c" stroke-width="38" stroke-linecap="round"/>
    <!-- Left boot -->
    <ellipse cx="-60" cy="168" rx="36" ry="18" fill="#1a2530"/>

    <!-- Right leg (behind) -->
    <path d="M 20 60 Q 40 110 55 158"
          fill="none" stroke="#3a4a5c" stroke-width="36" stroke-linecap="round"/>
    <!-- Right boot -->
    <ellipse cx="62" cy="168" rx="32" ry="16" fill="#1a2530"/>

    <!-- Rucksack -->
    <rect x="38" y="-155" width="60" height="85" rx="14" fill="#8b4513" opacity="0.9"/>
    <rect x="42" y="-150" width="52" height="10" rx="4" fill="#a0522d" opacity="0.7"/>
  </g>

  <!-- ===== CAMBRIDGE INSPIRED ARCH (King's College style) at top ===== -->
  <g opacity="0.22">
    <path d="M 180 330 L 180 220 Q 180 160 240 160 Q 300 160 300 220 L 300 330"
          fill="none" stroke="#d4c49a" stroke-width="8"/>
    <path d="M 724 330 L 724 220 Q 724 160 784 160 Q 844 160 844 220 L 844 330"
          fill="none" stroke="#d4c49a" stroke-width="8"/>
    <!-- Connecting lintel -->
    <line x1="180" y1="330" x2="844" y2="330" stroke="#d4c49a" stroke-width="6" opacity="0.4"/>
  </g>

  <!-- ===== TEXT BAND at bottom ===== -->
  <!-- Ribbon background -->
  <path d="M 100 920 Q 512 890 924 920 L 924 990 Q 512 1020 100 990 Z"
        fill="#1a3a5c" opacity="0.85"/>

  <!-- Club name text -->
  <text x="512" y="972" font-family="'Georgia', 'Palatino Linotype', serif"
        font-size="110" font-weight="700" letter-spacing="6"
        text-anchor="middle" fill="#c8a96e">
CRC
  </text>

  <!-- Subtle corner acorns / leaves decoration -->
  <!-- Top-left leaf cluster -->
  <g transform="translate(90, 100)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="20" ry="35" fill="#4a7c59" transform="rotate(-30)"/>
    <ellipse cx="30" cy="-10" rx="18" ry="30" fill="#3d6e4d" transform="rotate(10)"/>
    <ellipse cx="-20" cy="-20" rx="15" ry="28" fill="#4a7c59" transform="rotate(-60)"/>
  </g>
  <!-- Top-right leaf cluster -->
  <g transform="translate(934, 100)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="20" ry="35" fill="#4a7c59" transform="rotate(30)"/>
    <ellipse cx="-30" cy="-10" rx="18" ry="30" fill="#3d6e4d" transform="rotate(-10)"/>
    <ellipse cx="20" cy="-20" rx="15" ry="28" fill="#4a7c59" transform="rotate(60)"/>
  </g>

  <!-- Compass rose top-center (small, decorative) -->
  <g transform="translate(512, 110)" opacity="0.6">
    <circle cx="0" cy="0" r="38" fill="none" stroke="#c8a96e" stroke-width="3"/>
    <!-- N pointer -->
    <polygon points="0,-32 -7,-10 7,-10" fill="#c8a96e"/>
    <!-- S pointer -->
    <polygon points="0,32 -7,10 7,10" fill="#6a8a7a"/>
    <!-- E pointer -->
    <polygon points="32,0 10,-7 10,7" fill="#6a8a7a"/>
    <!-- W pointer -->
    <polygon points="-32,0 -10,-7 -10,7" fill="#6a8a7a"/>
    <circle cx="0" cy="0" r="5" fill="#c8a96e"/>
    <!-- N label -->
    <text x="0" y="-42" font-family="Georgia, serif" font-size="18" font-weight="bold"
          text-anchor="middle" fill="#c8a96e">N</text>
  </g>

</svg>
