<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#f5f1e8"/>

  <!-- Sun -->
  <circle cx="400" cy="200" r="60" fill="#f4b400"/>

  <!-- Mountains -->
  <path d="M0 250 Q150 150 300 250 T600 250 T800 250 V400 H0 Z" fill="#5fa8a4"/>
  <path d="M0 280 Q200 180 400 280 T800 280 V400 H0 Z" fill="#3b7ea1"/>
  <path d="M0 310 Q250 220 500 310 T800 310 V400 H0 Z" fill="#7fb069"/>

  <!-- Abstract leaves -->
  <ellipse cx="100" cy="80" rx="60" ry="20" fill="#e76f51" transform="rotate(-20 100 80)"/>
  <ellipse cx="700" cy="70" rx="60" ry="20" fill="#f4a261" transform="rotate(20 700 70)"/>
  <ellipse cx="120" cy="350" rx="80" ry="25" fill="#2a9d8f" transform="rotate(10 120 350)"/>
  <ellipse cx="680" cy="340" rx="80" ry="25" fill="#264653" transform="rotate(-10 680 340)"/>

  <!-- Small flowers -->
  <circle cx="200" cy="320" r="10" fill="#e63946"/>
  <circle cx="230" cy="300" r="8" fill="#f4a261"/>
  <circle cx="260" cy="330" r="6" fill="#e9c46a"/>

</svg>